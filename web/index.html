<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="yuvam">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>yuvam</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <script>
    // Global error handler to debug white screen on iOS
    window.onerror = function (message, source, lineno, colno, error) {
      alert("Error: " + message + "\nSource: " + source + "\nLine: " + lineno);
      return false;
    };
    window.onunhandledrejection = function (event) {
      alert("Unhandled Rejection: " + event.reason);
    };

    // Force HTML renderer for iOS compatibility (Both new and old styles)
    window.flutterWebRenderer = "html";
    window.flutterConfiguration = {
      renderer: "html",
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
